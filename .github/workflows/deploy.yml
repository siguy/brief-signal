name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci
      - run: npm run build
        env:
          BASE_PATH: /brief-signal

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - id: deployment
        uses: actions/deploy-pages@v4

      - name: Check for new briefing
        id: check-briefing
        run: |
          if git diff HEAD~1 --name-status --diff-filter=A | grep -q '^A.*content/briefings/.*\.md$'; then
            echo "new_briefing=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Notify subscribers via Buttondown
        if: steps.check-briefing.outputs.new_briefing == 'true'
        run: node scripts/send-email.js
        env:
          BUTTONDOWN_API_KEY: ${{ secrets.BUTTONDOWN_API_KEY }}
