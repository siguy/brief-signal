<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{title}} — AI Briefing</title>
  <meta name="description" content="{{subtitle}}">
  <meta property="og:title" content="{{title}} — AI Briefing">
  <meta property="og:description" content="{{subtitle}}">
  <meta property="og:type" content="article">
  <meta property="og:url" content="{{url}}">
  <meta name="twitter:card" content="summary">
  <meta name="twitter:title" content="{{title}} — AI Briefing">
  <meta name="twitter:description" content="{{subtitle}}">
  <link rel="icon" href="/favicon.ico" sizes="any">
  <style>
    :root {
      --bg: #ffffff;
      --text: #1a1a1a;
      --text-secondary: #555;
      --border: #e0e0e0;
      --accent: #2563eb;
      --accent-hover: #1d4ed8;
      --code-bg: #f5f5f5;
      --blockquote-bg: #f9fafb;
      --blockquote-border: #2563eb;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #0d1117;
        --text: #e6edf3;
        --text-secondary: #8b949e;
        --border: #30363d;
        --accent: #58a6ff;
        --accent-hover: #79b8ff;
        --code-bg: #161b22;
        --blockquote-bg: #161b22;
        --blockquote-border: #58a6ff;
      }
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.7;
      padding: 2rem 1rem;
    }
    .container { max-width: 680px; margin: 0 auto; }
    nav {
      margin-bottom: 2rem;
      padding-bottom: 1rem;
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    nav a {
      color: var(--accent);
      text-decoration: none;
      font-size: 0.9rem;
    }
    nav a:hover { text-decoration: underline; }
    .site-title {
      font-weight: 700;
      font-size: 1rem;
      color: var(--text);
      text-decoration: none;
    }
    .site-title:hover { color: var(--accent); }
    article h1 {
      font-size: 1.8rem;
      line-height: 1.2;
      margin-bottom: 0.5rem;
    }
    .subtitle {
      color: var(--text-secondary);
      font-size: 0.9rem;
      margin-bottom: 2rem;
    }
    article h2 {
      font-size: 1.3rem;
      margin-top: 2rem;
      margin-bottom: 0.75rem;
      padding-bottom: 0.3rem;
      border-bottom: 1px solid var(--border);
    }
    article h3 {
      font-size: 1.1rem;
      margin-top: 1.5rem;
      margin-bottom: 0.5rem;
    }
    article p { margin-bottom: 1rem; }
    article ul, article ol {
      margin-bottom: 1rem;
      padding-left: 1.5rem;
    }
    article li { margin-bottom: 0.4rem; }
    article a { color: var(--accent); text-decoration: none; }
    article a:hover { text-decoration: underline; }
    article strong { font-weight: 600; }
    article em { font-style: italic; }
    article blockquote {
      background: var(--blockquote-bg);
      border-left: 3px solid var(--blockquote-border);
      padding: 0.75rem 1rem;
      margin-bottom: 1rem;
      border-radius: 0 4px 4px 0;
    }
    article blockquote p { margin-bottom: 0; }
    article code {
      background: var(--code-bg);
      padding: 0.15rem 0.4rem;
      border-radius: 3px;
      font-size: 0.9em;
    }
    article img {
      max-width: 100%;
      height: auto;
      border-radius: 8px;
      margin-bottom: 1rem;
    }
    article hr {
      border: none;
      border-top: 1px solid var(--border);
      margin: 2rem 0;
    }
    footer {
      margin-top: 3rem;
      padding-top: 1rem;
      border-top: 1px solid var(--border);
      color: var(--text-secondary);
      font-size: 0.85rem;
    }
    /* Archive page */
    .archive-list { list-style: none; padding: 0; }
    .archive-list li {
      padding: 0.75rem 0;
      border-bottom: 1px solid var(--border);
    }
    .archive-list li:last-child { border-bottom: none; }
    .archive-list a {
      color: var(--text);
      text-decoration: none;
      display: block;
    }
    .archive-list a:hover { color: var(--accent); }
    .archive-date {
      color: var(--text-secondary);
      font-size: 0.85rem;
    }
    .archive-title { font-weight: 600; }
    @media (max-width: 480px) {
      body { padding: 1rem 0.75rem; }
      article h1 { font-size: 1.5rem; }
      article h2 { font-size: 1.15rem; }
    }
  </style>
</head>
<body>
  <div class="container">
    <nav>
      <a href="/" class="site-title">AI Briefing</a>
      <a href="/archive">Archive</a>
    </nav>
    {{content}}
    <footer>
      AI Briefing — Weekly market intelligence for startup conversations.
    </footer>
  </div>
</body>
</html>
